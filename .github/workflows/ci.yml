name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore ImportToPlanner.slnx

      - name: Verify formatting
        run: dotnet format ImportToPlanner.slnx --no-restore --verify-no-changes --verbosity minimal

      - name: Build solution
        run: dotnet build ImportToPlanner.slnx --no-restore

      - name: Restore Aspire AppHost
        run: dotnet restore apphost.cs

      - name: Build Aspire AppHost
        run: dotnet build apphost.cs --no-restore

      - name: Run tests
        run: dotnet test ImportToPlanner.slnx --no-build --verbosity normal
