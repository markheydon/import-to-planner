name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  javascript-syntax-check:
    name: JavaScript Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Verify JavaScript syntax
        shell: bash
        run: |
          mapfile -t js_files < <(git ls-files '*.js')

          if [[ ${#js_files[@]} -eq 0 ]]; then
            echo "No JavaScript files found."
            exit 0
          fi

          for file in "${js_files[@]}"; do
            echo "Checking syntax: ${file}"
            node --check "${file}"
          done

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore ImportToPlanner.slnx

      - name: Verify formatting
        run: dotnet format ImportToPlanner.slnx --no-restore --verify-no-changes --verbosity minimal

      - name: Build solution
        run: dotnet build ImportToPlanner.slnx --no-restore

      - name: Run tests
        env:
          Parameters__azureAdTenantId: organizations
          Parameters__azureAdClientId: 22222222-2222-2222-2222-222222222222
          Parameters__azureAdHomeTenantId: 11111111-1111-1111-1111-111111111111
          Parameters__enableCommercialMode: "false"
          Parameters__graphClientCertificatePassword: ""
          Parameters__graphClientCertificateBase64: ""
        run: dotnet test ImportToPlanner.slnx --no-build --verbosity normal
